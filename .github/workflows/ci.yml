name: CI

# Spectacle is a net8.0-windows WPF app — its test suite can only run on
# Windows (the Windows Desktop runtime is Windows-only). This workflow is the
# authoritative "all tests pass" gate: it runs the full xUnit suite on
# windows-latest for every push to main and every pull request.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore test/Spectacle.Tests/Spectacle.Tests.csproj

      - name: Build (warnings are errors)
        run: dotnet build test/Spectacle.Tests/Spectacle.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test test/Spectacle.Tests/Spectacle.Tests.csproj -c Release --no-build
